<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Angels Kindergarten | Coming Soon</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Kalam:wght@300;400;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="LAK2logo.png">
    
    <style>
        /* --- Design Tokens --- */
        :root {
            --green-organic: #9BBA8E;
            --coral: #FF8B8B;
            --sky-mist: #A7D8F0;
            --lavender: #D6C4E1;
            --primary-bg: #fcfbf2;
            --buttercream: #FFF4BD;
            --text-dark: #3D2B1F;
            --text-body: #5a4a3f;
            --white: #ffffff;
            --yellow: #fff59c;
            --pink-mist: #fab3f6;
            --shadow-soft: 0 4px 20px rgba(61,43,31,0.08);
            --spring-ease: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- Reset --- */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        /* --- Body & Grain Texture Overlay --- */
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-body);
            line-height: 1.7;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        /* --- Typography --- */
        h1, h2, h3, h4 {
            font-family: 'Chewy', cursive;
            color: var(--text-dark);
            line-height: 1.2;
        }

        h1 { 
            font-size: clamp(3rem, 8vw, 5rem); 
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        .handwritten {
            font-family: 'Kalam', cursive;
            color: var(--coral);
            font-size: clamp(1.5rem, 4vw, 2rem);
            display: block;
            margin-bottom: 10px;
            transform: rotate(-2deg);
        }

        p {
            font-family: 'Quicksand', sans-serif;
            font-weight: 500;
            font-size: 1.2rem;
            max-width: 50ch;
            margin: 0 auto 40px;
        }

        /* --- Scribble Underline --- */
        .highlight {
            position: relative;
            display: inline-block;
            color: var(--green-organic);
        }

        .highlight svg.scribble {
            position: absolute;
            bottom: -6px;
            left: -4px;
            width: calc(100% + 8px);
            height: 12px;
            pointer-events: none;
        }

        .highlight svg.scribble path {
            fill: none;
            stroke: var(--coral);
            stroke-width: 4;
            stroke-linecap: round;
        }

        /* --- Brand --- */
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        .brand .leaf-icon {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .brand-logo {
            height: 60px;
            width: auto;
            max-width: 360px;
            object-fit: contain;
        }

        .brand span {
            font-family: 'Chewy', cursive;
            font-size: 1.8rem;
            color: var(--text-dark);
        }

        /* --- Buttons --- */
        .btn {
            display: inline-block;
            padding: 16px 40px;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            position: relative;
            background: var(--coral);
            color: var(--white);
            box-shadow: var(--shadow-soft);
        }

        .btn:hover {
            animation: jiggle 0.4s ease;
            box-shadow: 0 4px 16px rgba(255, 139, 139, 0.4);
            transform: translateY(-2px);
        }

        /* --- Doodles --- */
        .doodle {
            position: absolute;
            pointer-events: none;
            z-index: -1;
        }

        .doodle.sun {
            top: 10%;
            right: 15%;
            width: 120px;
            height: 120px;
            animation: float 6s ease-in-out infinite;
        }

        .doodle.flower {
            bottom: 15%;
            left: 10%;
            width: 100px;
            height: 100px;
            animation: float 5s ease-in-out infinite 1s;
        }

        .doodle.star {
            top: 20%;
            left: 20%;
            width: 60px;
            height: 60px;
            animation: float 4s ease-in-out infinite 0.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        @keyframes jiggle {
            0% { transform: rotate(0); }
            20% { transform: rotate(-3deg); }
            40% { transform: rotate(3deg); }
            60% { transform: rotate(-2deg); }
            80% { transform: rotate(2deg); }
            100% { transform: rotate(0); }
        }

        /* --- Container --- */
        .container {
            position: relative;
            z-index: 10;
            padding: 40px 20px;
            width: 100%;
            max-width: 800px;
        }

        /* --- Input Form --- */
        .notify-form {
            display: flex;
            gap: 12px;
            justify-content: center;
            max-width: 500px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .notify-input {
            flex: 1;
            min-width: 250px;
            padding: 16px 24px;
            border-radius: 50px;
            border: 2px dashed var(--lavender);
            background: var(--white);
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s;
        }

        .notify-input:focus {
            border-color: var(--coral);
            border-style: solid;
            box-shadow: 0 0 0 4px rgba(255, 139, 139, 0.1);
        }

        /* --- Wavy Bottom --- */
        .bottom-wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            line-height: 0;
            z-index: 1;
        }
        
        .bottom-wave svg {
            display: block;
            width: 100%;
            height: 100px;
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .handwritten { font-size: 1.2rem; }
            
            .doodle.sun { width: 70px; height: 70px; right: 0; top: 5%; opacity: 0.6; }
            .doodle.flower { width: 60px; height: 60px; left: 0; bottom: 10%; opacity: 0.6; }
            .doodle.star { width: 40px; height: 40px; top: 15%; left: 5%; opacity: 0.6; }
            .brand .leaf-icon,
            .brand-logo { height: 45px; }

            .notify-form { flex-direction: column; width: 100%; }
            .notify-input { min-width: 100%; }
            .btn { width: 100%; text-align: center; }
            
            .bottom-wave svg { height: 60px; }
        }

    </style>
</head>
<body>

    <!-- Doodles Background -->
    <svg class="doodle sun" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="20" fill="var(--buttercream)" stroke="var(--text-dark)" stroke-width="4"/>
        <line x1="50" y1="10" x2="50" y2="25" stroke="var(--text-dark)" stroke-width="4" stroke-linecap="round"/>
        <line x1="50" y1="90" x2="50" y2="75" stroke="var(--text-dark)" stroke-width="4" stroke-linecap="round"/>
        <line x1="10" y1="50" x2="25" y2="50" stroke="var(--text-dark)" stroke-width="4" stroke-linecap="round"/>
        <line x1="90" y1="50" x2="75" y2="50" stroke="var(--text-dark)" stroke-width="4" stroke-linecap="round"/>
        <line x1="22" y1="22" x2="33" y2="33" stroke="var(--text-dark)" stroke-width="4" stroke-linecap="round"/>
        <line x1="78" y1="78" x2="67" y2="67" stroke="var(--text-dark)" stroke-width="4" stroke-linecap="round"/>
        <line x1="22" y1="78" x2="33" y2="67" stroke="var(--text-dark)" stroke-width="4" stroke-linecap="round"/>
        <line x1="78" y1="22" x2="67" y2="33" stroke="var(--text-dark)" stroke-width="4" stroke-linecap="round"/>
    </svg>

    <svg class="doodle flower" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 50 Q 20 20, 50 10 Q 80 20, 50 50" fill="var(--lavender)" stroke="var(--text-dark)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M50 50 Q 80 20, 90 50 Q 80 80, 50 50" fill="var(--lavender)" stroke="var(--text-dark)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M50 50 Q 80 80, 50 90 Q 20 80, 50 50" fill="var(--lavender)" stroke="var(--text-dark)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M50 50 Q 20 80, 10 50 Q 20 20, 50 50" fill="var(--lavender)" stroke="var(--text-dark)" stroke-width="3" stroke-linejoin="round"/>
        <circle cx="50" cy="50" r="10" fill="var(--buttercream)" stroke="var(--text-dark)" stroke-width="3"/>
    </svg>

    <svg class="doodle star" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L60 40 L90 50 L60 60 L50 90 L40 60 L10 50 L40 40 Z" fill="var(--sky-mist)" stroke="var(--text-dark)" stroke-width="3" stroke-linejoin="round"/>
    </svg>

    <div class="container">
        
        <div class="brand">
            <img src="LAK2logo.png" alt="Little Angels Icon" class="leaf-icon">
            <img src="LAKlogo.png" alt="Little Angels Kindergarten" class="brand-logo">
        </div>

        <span class="handwritten">Something magical is brewing...</span>
        
        <h1>
            We are 
            <span class="highlight">
                Coming Soon!
                <!-- Scribble Underline -->
                <svg class="scribble" viewBox="0 0 100 10" preserveAspectRatio="none">
                    <path d="M 0 5 Q 25 -5, 50 5 T 100 5"/>
                </svg>
            </span>
        </h1>
        
        <p>Our little scrapbook is almost ready to open its pages. We're busy crafting a warm, safe, and inspiring environment for every little angel.</p>
        
        <form class="notify-form" onsubmit="event.preventDefault(); alert('Thanks! We will let you know when we launch.');">
            <input type="email" class="notify-input" placeholder="Enter your email address" required>
            <button type="submit" class="btn">Notify Me</button>
        </form>

    </div>

    <!-- Wavy Bottom Divider -->
    <div class="bottom-wave">
        <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,64L80,69.3C160,75,320,85,480,80C640,75,800,53,960,48C1120,43,1280,53,1360,58.7L1440,64L1440,120L1360,120C1280,120,1120,120,960,120C800,120,640,120,480,120C320,120,160,120,80,120L0,120Z" fill="var(--buttercream)"></path>
        </svg>
    </div>

</body>
</html>
